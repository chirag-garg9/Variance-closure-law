# configs/mamba_imdb.yaml
experiment: "mamba_llm"
model_name: "state-spaces/mamba-130m-hf"
dataset: "wiki_imdb"
block_size: 128
batch_size: 4
seed: 42

# Task 1: Basin Stabilization (1 full epoch for 128 block size)
task1_steps: 10000     
task1_lr: 0.0005
task1_weight_decay: 0.01

# Task 2: Geometric ODE Tracking
task2_steps: 2000
task2_lr: 0.0005     # Kept identical to GPT-2 for 1:1 comparison
task2_weight_decay: 0.0

log_interval: 1
checkpoint_dir: "checkpoints/"
results_path: "results/grad/mamba_forgetting_ode.csv"